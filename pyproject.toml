[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cibica"
version = "0.1.0"
description = "Circle estimation by CIBICA with example datasets."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [
    {name = "Torbjörn E. M. Nordling", email = "t@nordlinglab.org"},
]
keywords = ["machine-learning", "system-identification", "data-analysis"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    # Add your dependencies here
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-html>=4.0",
    "ruff>=0.3.0",
    "mypy>=1.0",
]

[project.urls]
Homepage = "https://github.com/nordlinglab/cibica"
Repository = "https://github.com/nordlinglab/cibica"

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

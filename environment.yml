# Conda environment pinning the interpreter and dependencies used to produce
# the CIBICA results submitted to The Visual Computer.
#
#   conda env create -f environment.yml
#   conda activate cibica
#
# Tested on macOS arm64 (Apple M4 Max). The pip block pins exact package
# versions; conda pins the Python interpreter (3.9.23).
name: cibica
channels:
  - conda-forge
dependencies:
  - python=3.9.23
  - pip
  - pip:
      - -r requirements.lock
